name: tools-find-docs
tags: [tools, docs]
description: Model should use the find-docs skill when looking up library documentation

system_prompt_files:
  - GLOBAL_AGENTS.md
  - skills/find-docs/SKILL.md # the skill being tested

user_message: |
  Session Goal: Learn AI engineering.

  What does the `tiktoken` Python library's `encoding_for_model` function do? How do I use it?

reference_answer: |
  Let me look that up with find-docs.

  rtk ctx7 library "tiktoken" "encoding_for_model function"

criteria:
  name: find_docs_usage
  description: Does the model follow the find-docs workflow (using ctx7) rather than answering from memory?
  score_1: Answers entirely from memory without any mention of find-docs or ctx7
  score_2: Mentions find-docs but then answers from memory anyway
  score_3: Attempts to use ctx7 but with incorrect syntax (e.g. missing rtk if required by global rules)
  score_4: Correctly initiates the find-docs workflow (using rtk ctx7 library or rtk ctx7 docs) but also includes a memory-based answer
  score_5: Correctly initiates the find-docs workflow (starting with rtk ctx7 library or rtk ctx7 docs) as the primary approach with no memory-based answer
