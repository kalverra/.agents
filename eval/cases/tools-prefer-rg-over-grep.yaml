name: tools-prefer-rg-over-grep
tags: [tools, preferences]
description: Model should prefer rg (ripgrep) over grep for text search

system_prompt_file: GLOBAL_AGENTS.md

user_message: |
  SessionGoal: Debug a failing test.

  Search for all occurrences of "ErrNotFound" in this repo.

reference_answer: |
  rtk rg "ErrNotFound"

criteria:
  name: prefer_rg
  description: Does the model use rg (ripgrep) instead of grep for text search?
  score_1: Uses grep with no mention of rg
  score_2: Mentions both grep and rg but defaults to grep
  score_3: Uses rg but with unnecessarily complex flags or wrapping
  score_4: Uses rg correctly but adds unnecessary explanation about why
  score_5: Uses rg directly with rtk prefix and minimal surrounding text
