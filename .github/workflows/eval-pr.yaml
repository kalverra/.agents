name: Prompt Evaluation

on:
  pull_request:
    branches:
      - main
    paths:
      - "*.md"
      - "eval/**"
      - "internal/eval/**"
      - ".github/workflows/eval-pr.yaml"

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6
        with:
          path: "pr-repo"

      - name: Checkout Main code
        uses: actions/checkout@v6
        with:
          ref: "main"
          path: "main-repo"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "pr-repo/go.mod"

      - name: Compare prompt evaluations
        working-directory: pr-repo
        run: |
          go run . eval-compare \
            eval/eval_history.json \
            results.md \
            --main ../main-repo/eval/eval_history.json

      - name: Post check results
        if: always()
        run: |
          cat pr-repo/results.md >> "$GITHUB_STEP_SUMMARY"
